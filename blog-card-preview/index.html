<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card Challenge</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="card-container">
        <section class="card-img">
            <!-- used for header image placeholder -->
        </section>

        <section class="card-info">
            <h4 class="card-label">Learning</h4>
            <h4 class="card-timestamp">Published 21 Dec 2023</h4>
            <h1 class="card-title">HTML & CSS foundations</h1>
            <p class="card-text">These languages are the backbone of every website, defining structure, content, and
                presentation.</p>
        </section>

        <section class="card-user">
            <img src="./assets/image-avatar.webp" alt="profile image" class="card-user-image">
            <p class="card-user-name">Greg Hooper</p>
        </section>
    </main>
</body>

</html>
